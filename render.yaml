# render.yaml — SINGLE SERVICE deployment
# Frontend + Backend from one Render web service. No CORS. No VITE_API_URL.

services:
  - type: web
    name: smartadmin
    runtime: python
    rootDir: .

    buildCommand: "npm --prefix frontend install && npm --prefix frontend run build && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: NODE_VERSION
        value: "20"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sstg-db
          property: connectionString
      - key: SCHOOL_NAME
        value: "Greenfield Academy"
      - key: ACADEMIC_YEAR
        value: "2025/2026"
      - key: CORS_ORIGINS
        value: "*"
      # Uncomment after getting free key from https://aistudio.google.com/app/apikey
      # - key: GEMINI_API_KEY
      #   sync: false
      # Uncomment after getting free key from https://sendgrid.com
      # - key: SENDGRID_API_KEY
      #   sync: false

  - type: pserv
    name: sstg-db
    runtime: postgres
    databaseName: sstg
    databaseUser: sstg_user
    ipAllowList: []
