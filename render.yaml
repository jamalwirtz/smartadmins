# render.yaml — SINGLE SERVICE deployment
# Frontend + Backend served from one Render web service.
# No CORS. No VITE_API_URL. One bill.

services:
  - type: web
    name: smartadmin
    runtime: python
    rootDir: .

    # Build: React first, then Python deps — both from project root
    buildCommand: "npm --prefix frontend install && npm --prefix frontend run build && pip install -r requirements.txt"

    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"

    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: NODE_VERSION
        value: "20"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sstg-db
          property: connectionString
      - key: SCHOOL_NAME
        value: "Greenfield Academy"
      - key: ACADEMIC_YEAR
        value: "2025/2026"
      - key: CORS_ORIGINS
        value: "*"
      # Set GEMINI_API_KEY in Render dashboard after getting from Google AI Studio
      # - key: GEMINI_API_KEY
      #   sync: false
      # Set SENDGRID_API_KEY in Render dashboard (optional — only for email)
      # - key: SENDGRID_API_KEY
      #   sync: false

  - type: pserv
    name: sstg-db
    runtime: postgres
    databaseName: sstg
    databaseUser: sstg_user
    ipAllowList: []
